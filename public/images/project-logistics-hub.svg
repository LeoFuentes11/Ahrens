<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#2a2a2a"/>
  <!-- Large shed -->
  <polygon points="50,380 400,180 750,380" fill="#3a3a3a"/>
  <rect x="50" y="380" width="700" height="100" fill="#303030"/>
  <!-- Steel ribs -->
  <line x1="150" y1="380" x2="400" y2="215" stroke="#4a4a4a" stroke-width="3"/>
  <line x1="250" y1="380" x2="400" y2="195" stroke="#4a4a4a" stroke-width="3"/>
  <line x1="350" y1="380" x2="400" y2="182" stroke="#4a4a4a" stroke-width="3"/>
  <line x1="450" y1="380" x2="400" y2="182" stroke="#4a4a4a" stroke-width="3"/>
  <line x1="550" y1="380" x2="400" y2="195" stroke="#4a4a4a" stroke-width="3"/>
  <line x1="650" y1="380" x2="400" y2="215" stroke="#4a4a4a" stroke-width="3"/>
