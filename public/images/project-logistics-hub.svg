  <rect x="300" y="340" width="80" height="140" fill="#1a1a1a"/>
  <rect x="420" y="340" width="80" height="140" fill="#1a1a1a"/>
  <rect x="50" y="380" width="700" height="6" fill="#F26522" opacity="0.6"/>
  <text x="400" y="120" font-family="Arial, sans-serif" font-size="16" fill="#F26522" opacity="0.7" text-anchor="middle" letter-spacing="4">STEEL FABRICATION</text>
  <text x="400" y="155" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.5" text-anchor="middle">Wheatbelt Logistics Hub</text>
  <text x="400" y="455" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.3" text-anchor="middle">project-logistics-hub.jpg · 800 × 480</text>
