<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#1a1a2e"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.08"/>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#F26522" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Construction silhouette -->
  <rect x="200" y="600" width="400" height="480" fill="#2a2a3e"/>
  <rect x="650" y="450" width="600" height="630" fill="#252535"/>
  <rect x="1300" y="520" width="350" height="560" fill="#2a2a3e"/>
  <rect x="1680" y="650" width="240" height="430" fill="#222230"/>
  <!-- Crane -->
  <rect x="900" y="100" width="12" height="360" fill="#F26522" opacity="0.7"/>
  <rect x="760" y="100" width="152" height="8" fill="#F26522" opacity="0.7"/>
  <line x1="912" y1="100" x2="820" y2="380" stroke="#F26522" stroke-width="2" opacity="0.4"/>
  <!-- Label -->
  <text x="960" y="960" font-family="Arial, sans-serif" font-size="28" fill="#F26522" opacity="0.4" text-anchor="middle" letter-spacing="8">REPLACE WITH HERO IMAGE</text>
  <text x="960" y="1000" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.2" text-anchor="middle">1920 × 1080 · public/images/hero-bg.jpg</text>
</svg>
